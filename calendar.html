<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --surface: #f7f6f3; --border: #e8e7e3; --border-md: #d0cfc9;
  --text-1: #1a1a18; --text-2: #5a5955; --text-3: #a8a7a1;
  --font: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
  --work-bg: #EEF2FF; --work-text: #3730A3; --work-dot: #6366F1;
  --personal-bg: #ECFDF5; --personal-text: #065F46; --personal-dot: #10B981;
  --meet-bg: #FFF7ED; --meet-text: #9A3412; --meet-dot: #F97316;
  --memo-bg: #FDF4FF; --memo-text: #6B21A8; --memo-dot: #A855F7;
  --anni-bg: #FFF1F2; --anni-text: #9F1239; --anni-dot: #F43F5E;
}
html, body { background: var(--bg); font-family: var(--font); color: var(--text-1); -webkit-font-smoothing: antialiased; }
.page { max-width: 720px; margin: 0 auto; padding: 36px 28px 60px; }
.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
.month-name { font-size: 30px; font-weight: 300; letter-spacing: -0.8px; line-height: 1; }
.year-tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-left: 8px; letter-spacing: 0.1em; }
.nav { display: flex; gap: 2px; align-items: center; }
.nav-btn { height: 30px; min-width: 30px; padding: 0 10px; border: 1px solid var(--border); background: transparent; border-radius: 7px; cursor: pointer; color: var(--text-2); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; transition: all 0.12s; }
.nav-btn:hover { background: var(--surface); border-color: var(--border-md); color: var(--text-1); }
.sync-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: transparent; border-radius: 7px; cursor: pointer; color: var(--text-3); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; margin-left: 4px; }
.sync-btn:hover { color: var(--text-1); background: var(--surface); }
.sync-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.divider { height: 1px; background: var(--border); margin-bottom: 14px; }
.dow-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 5px; }
.dow { text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); padding: 5px 0; letter-spacing: 0.07em; }
.dow:first-child { color: #EF4444; } .dow:last-child { color: #6366F1; }
.day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cell { min-height: 74px; padding: 6px 4px 4px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
.cell:hover { background: var(--surface); }
.cell.other-month { opacity: 0.22; pointer-events: none; }
.cell.has-events { border: 1px solid var(--border); }
.cell.selected { background: #F8F7F4; border: 1px solid var(--border-md); }
.num-wrap { display: flex; justify-content: center; margin-bottom: 3px; }
.num { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 400; color: var(--text-2); border-radius: 50%; font-family: var(--font-mono); }
.cell.today .num { background: #1a1a18; color: #fff; font-weight: 500; }
.cell.sunday .num { color: #EF4444; } .cell.saturday .num { color: #6366F1; }
.ev { font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.5; font-weight: 500; }
.ev-업무   { background: var(--work-bg);     color: var(--work-text); }
.ev-개인   { background: var(--personal-bg); color: var(--personal-text); }
.ev-약속   { background: var(--meet-bg);     color: var(--meet-text); }
.ev-기타   { background: var(--memo-bg);     color: var(--memo-text); }
.ev-기념일 { background: var(--anni-bg);     color: var(--anni-text); }
.ev-more { font-size: 9px; color: var(--text-3); padding: 1px 5px; margin-top: 1px; font-family: var(--font-mono); }

/* Detail panel */
.detail { margin-top: 14px; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; display: none; animation: slideIn 0.15s ease; }
.detail.open { display: block; }
@keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.detail-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.detail-date-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); letter-spacing: 0.06em; }
.detail-notion-btn { font-size: 11px; padding: 5px 12px; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer; color: var(--text-2); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all 0.1s; }
.detail-notion-btn:hover { background: var(--text-1); color: white; border-color: var(--text-1); }
.detail-body { padding: 10px 16px 14px; min-height: 50px; }
.ev-row { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; background: var(--surface); margin-bottom: 5px; }
.ev-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ev-name { flex: 1; font-size: 13px; color: var(--text-1); }
.ev-range-tag { font-size: 9px; font-family: var(--font-mono); color: var(--text-3); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; white-space: nowrap; }
.ev-cat-badge { font-size: 9.5px; font-family: var(--font-mono); padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.ev-empty { font-size: 12px; color: var(--text-3); text-align: center; padding: 10px 0; font-style: italic; }

/* Status bar */
.status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--surface); font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: #10B981; }
.status-dot.error { background: #EF4444; }
.status-dot.loading { background: #F59E0B; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Footer */
.footer { margin-top: 18px; padding-top: 13px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-3); font-family: var(--font-mono); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; }
.week-count { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; }

/* Config panel */
.config-panel { margin-top: 14px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; display: none; }
.config-panel.open { display: block; }
.config-title { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); margin-bottom: 12px; letter-spacing: 0.06em; }
.config-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.config-label { font-size: 12px; color: var(--text-2); min-width: 80px; }
.config-input { flex: 1; min-width: 200px; height: 32px; border: 1px solid var(--border-md); border-radius: 6px; padding: 0 10px; font-size: 12px; font-family: var(--font-mono); color: var(--text-1); background: white; outline: none; }
.config-input:focus { border-color: #6366F1; }
.config-save { height: 32px; padding: 0 16px; background: #1a1a18; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
.config-save:hover { opacity: 0.75; }
.config-note { font-size: 10px; color: var(--text-3); font-family: var(--font-mono); margin-top: 8px; line-height: 1.6; }

@media (max-width: 480px) {
  .page { padding: 18px 12px 40px; } .month-name { font-size: 22px; } .cell { min-height: 56px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <span class="month-name" id="monthName"></span>
      <span class="year-tag" id="yearTag"></span>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="go(-1)">←</button>
      <button class="nav-btn" onclick="goToday()">TODAY</button>
      <button class="nav-btn" onclick="go(1)">→</button>
      <button class="sync-btn" id="syncBtn" onclick="fetchEvents()" title="새로고침">↻</button>
      <button class="nav-btn" onclick="toggleConfig()" title="설정">⚙</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="dow-row">
    <div class="dow">SUN</div><div class="dow">MON</div><div class="dow">TUE</div>
    <div class="dow">WED</div><div class="dow">THU</div><div class="dow">FRI</div><div class="dow">SAT</div>
  </div>

  <div class="day-grid" id="grid"></div>

  <!-- Detail panel -->
  <div class="detail" id="detail">
    <div class="detail-head">
      <span class="detail-date-label" id="detailLabel"></span>
      <a class="detail-notion-btn" href="https://notion.so/e24f05bad0d3448cb38939ef1b11c98f" target="_blank">
        노션에서 일정 추가 →
      </a>
    </div>
    <div class="detail-body">
      <div id="evList"></div>
    </div>
    <div class="status-bar" id="statusBar" style="display:none">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <!-- Config panel -->
  <div class="config-panel" id="configPanel">
    <div class="config-title">NOTION API 설정</div>
    <div class="config-row">
      <span class="config-label">API Key</span>
      <input class="config-input" id="apiKeyInput" type="password" placeholder="secret_xxxxxxxxxxxx" />
    </div>
    <div class="config-row">
      <button class="config-save" onclick="saveConfig()">저장 후 불러오기</button>
    </div>
    <div class="config-note">
      노션 API 키는 notion.so/my-integrations 에서 발급받을 수 있어요.<br>
      저장된 키는 이 브라우저에만 보관되며 외부로 전송되지 않아요.
    </div>
  </div>

  <div class="footer">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--personal-dot)"></div>개인</div>
      <div class="leg"><div class="leg-dot" style="background:var(--work-dot)"></div>업무</div>
      <div class="leg"><div class="leg-dot" style="background:var(--meet-dot)"></div>약속</div>
      <div class="leg"><div class="leg-dot" style="background:var(--anni-dot)"></div>기념일</div>
      <div class="leg"><div class="leg-dot" style="background:var(--memo-dot)"></div>기타</div>
    </div>
    <div class="week-count" id="weekCount"></div>
  </div>

</div>

<script>
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS_KR = ['일','월','화','수','목','금','토'];
const DB_ID = 'e24f05bad0d3448cb38939ef1b11c98f';
const CAT_DOT = {
  '업무': 'var(--work-dot)', '개인': 'var(--personal-dot)',
  '약속': 'var(--meet-dot)', '기념일': 'var(--anni-dot)', '기타': 'var(--memo-dot)'
};
const CAT_BADGE = {
  '업무': 'background:var(--work-bg);color:var(--work-text)',
  '개인': 'background:var(--personal-bg);color:var(--personal-text)',
  '약속': 'background:var(--meet-bg);color:var(--meet-text)',
  '기념일': 'background:var(--anni-bg);color:var(--anni-text)',
  '기타': 'background:var(--memo-bg);color:var(--memo-text)',
};

const today = new Date();
let cur = new Date(today.getFullYear(), today.getMonth(), 1);
let selectedKey = null;
let allEvents = [];

function getApiKey() { return localStorage.getItem('notion_api_key') || ''; }
function saveConfig() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) return;
  localStorage.setItem('notion_api_key', k);
  document.getElementById('configPanel').classList.remove('open');
  fetchEvents();
}
function toggleConfig() {
  const p = document.getElementById('configPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    document.getElementById('apiKeyInput').value = getApiKey();
  }
}

function go(d) { cur = new Date(cur.getFullYear(), cur.getMonth()+d, 1); render(); }
function goToday() { cur = new Date(today.getFullYear(), today.getMonth(), 1); render(); }

/* ── Fetch from Notion API ── */
async function fetchEvents() {
  const key = getApiKey();
  if (!key) { document.getElementById('configPanel').classList.add('open'); return; }

  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');
  setStatus('loading', '노션에서 불러오는 중...');

  try {
    const res = await fetch(`https://api.anthropic.com/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a Notion API proxy. The user will give you a Notion API key and database ID. Call the Notion API to fetch all pages from the database and return them as a JSON array. Each item should have: id, name (일정 이름), start (날짜 start, YYYY-MM-DD), end (날짜 end, YYYY-MM-DD or null), category (카테고리). Return ONLY valid JSON array, no other text.`,
        messages: [{
          role: 'user',
          content: `Notion API Key: ${key}\nDatabase ID: ${DB_ID}\n\nFetch all pages from this Notion database and return as JSON array with fields: id, name, start, end, category.`
        }]
      })
    });

    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    allEvents = JSON.parse(clean);
    render();
    setStatus('ok', `${allEvents.length}개 일정 불러옴 · ${new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`);
  } catch(e) {
    setStatus('error', '불러오기 실패 — API 키를 확인해주세요');
  } finally {
    btn.classList.remove('spinning');
  }
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  bar.style.display = 'flex';
  dot.className = 'status-dot' + (type === 'error' ? ' error' : type === 'loading' ? ' loading' : '');
  txt.textContent = msg;
}

/* ── Build month map ── */
function getMonthMap(y, m) {
  const map = {};
  const first = new Date(y, m, 1);
  const last  = new Date(y, m+1, 0);
  allEvents.forEach(ev => {
    if (!ev.start) return;
    const s = new Date(ev.start);
    const e = ev.end ? new Date(ev.end) : new Date(ev.start);
    for (let dt = new Date(Math.max(s, first)); dt <= new Date(Math.min(e, last)); dt.setDate(dt.getDate()+1)) {
      const k = `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
      if (!map[k]) map[k] = [];
      map[k].push(ev);
    }
  });
  return map;
}

/* ── Render ── */
function render() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('monthName').textContent = MONTHS_EN[m];
  document.getElementById('yearTag').textContent = y;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const map = getMonthMap(y, m);
  const firstDay = new Date(y, m, 1).getDay();
  const dim = new Date(y, m+1, 0).getDate();
  const dip = new Date(y, m, 0).getDate();
  let cells = [];
  for (let i = firstDay-1; i>=0; i--) cells.push({d: dip-i, other:true});
  for (let d=1; d<=dim; d++) cells.push({d, other:false});
  while (cells.length%7!==0) cells.push({d: cells.length-dim-firstDay+1, other:true});
  document.getElementById('weekCount').textContent = (cells.length/7)+' WEEKS';

  cells.forEach(({d, other}, idx) => {
    const dow = idx%7;
    const k = `${y}-${m+1}-${d}`;
    const evs = (!other && map[k]) ? map[k] : [];
    const isToday = !other && d===today.getDate() && m===today.getMonth() && y===today.getFullYear();
    const isSel = !other && k===selectedKey;
    const cell = document.createElement('div');
    let cls = 'cell';
    if (other) cls += ' other-month';
    if (isToday) cls += ' today';
    if (dow===0) cls += ' sunday';
    if (dow===6) cls += ' saturday';
    if (!other && evs.length>0) cls += ' has-events';
    if (isSel) cls += ' selected';
    cell.className = cls;
    const nw = document.createElement('div'); nw.className='num-wrap';
    const n = document.createElement('div'); n.className='num'; n.textContent=d;
    nw.appendChild(n); cell.appendChild(nw);
    evs.slice(0,2).forEach(ev => {
      const tag = document.createElement('div');
      tag.className = 'ev ev-' + (ev.category || '기타');
      tag.textContent = ev.name || '(제목 없음)';
      cell.appendChild(tag);
    });
    if (evs.length>2) {
      const more = document.createElement('div'); more.className='ev-more';
      more.textContent='+'+(evs.length-2); cell.appendChild(more);
    }
    if (!other) cell.onclick = () => selectDay(k, d, y, m, evs);
    grid.appendChild(cell);
  });
}

function selectDay(k, d, y, m, evs) {
  if (selectedKey===k) { selectedKey=null; document.getElementById('detail').classList.remove('open'); render(); return; }
  selectedKey = k;
  const dow = new Date(y, m, d).getDay();
  document.getElementById('detailLabel').textContent = `${y}년 ${MONTHS_KR[m]} ${d}일 (${DAYS_KR[dow]})`;
  const list = document.getElementById('evList');
  list.innerHTML = '';
  if (!evs || evs.length===0) { list.innerHTML='<div class="ev-empty">이날 일정이 없어요</div>'; }
  else {
    evs.forEach(ev => {
      const row = document.createElement('div'); row.className='ev-row';
      const isRange = ev.end && ev.end !== ev.start;
      const rangeTag = isRange ? `<span class="ev-range-tag">${ev.start} → ${ev.end}</span>` : '';
      const cat = ev.category || '기타';
      row.innerHTML = `
        <div class="ev-dot" style="background:${CAT_DOT[cat]||'#ccc'}"></div>
        <span class="ev-name">${esc(ev.name||'')}</span>
        ${rangeTag}
        <span class="ev-cat-badge" style="${CAT_BADGE[cat]||''}">${cat}</span>`;
      list.appendChild(row);
    });
  }
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('detail').classList.add('open');
  render();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 초기 로드
render();
if (getApiKey()) fetchEvents();
else {
  setTimeout(() => {
    document.getElementById('configPanel').classList.add('open');
  }, 300);
}
</script>
</body>
</html>
